<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Conditioning English Learning App</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://unpkg.com/@chakra-ui/core@latest/dist/css/chakra-ui.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root" class="p-4"></div>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@chakra-ui/core@latest/dist/chakra-ui-core.min.js"></script>
  <script type="text/babel">
    const { Tabs, TabList, TabPanels, Tab, TabPanel } = ChakraUI.React;

    const vocabularyData = [
      {
        word: "invention",
        definition: "something new that people create",
        vietnamese: "phát minh",
        exampleSentence: "The air conditioner is a useful invention.",
        quizQuestion: "What is an invention?",
        options: [
          { id: 'A', label: "something new created by people", correct: true },
          { id: 'B', label: "a type of job" },
          { id: 'C', label: "a place" }
        ]
      },
      {
        word: "engineer",
        definition: "a person who designs and makes machines or large structures",
        vietnamese: "kỹ sư",
        exampleSentence: "Willis Carrier was an engineer.",
        quizQuestion: "What is an engineer?",
        options: [
          { id: 'A', label: "a person who designs and makes machines or large structures", correct: true },
          { id: 'B', label: "a teacher" },
          { id: 'C', label: "a doctor" }
        ]
      },
      {
        word: "humidity",
        definition: "the amount of water vapor in the air",
        vietnamese: "độ ẩm",
        exampleSentence: "High humidity makes the air feel heavy.",
        quizQuestion: "What is humidity?",
        options: [
          { id: 'A', label: "the amount of water vapor in the air", correct: true },
          { id: 'B', label: "the temperature of the air" },
          { id: 'C', label: "the wind speed" }
        ]
      },
      {
        word: "temperature",
        definition: "how hot or cold something is",
        vietnamese: "nhiệt độ",
        exampleSentence: "The room temperature was too high.",
        quizQuestion: "What is temperature?",
        options: [
          { id: 'A', label: "how hot or cold something is", correct: true },
          { id: 'B', label: "the level of humidity" },
          { id: 'C', label: "the speed of the wind" }
        ]
      },
      {
        word: "industrial",
        definition: "related to factories or the production of goods",
        vietnamese: "công nghiệp",
        exampleSentence: "Industrial cities have many factories.",
        quizQuestion: "What does industrial mean?",
        options: [
          { id: 'A', label: "related to factories or the production of goods", correct: true },
          { id: 'B', label: "related to agriculture" },
          { id: 'C', label: "related to computers" }
        ]
      },
      {
        word: "install",
        definition: "to put something in place or set up",
        vietnamese: "cài đặt",
        exampleSentence: "They install air conditioners in offices.",
        quizQuestion: "What does install mean?",
        options: [
          { id: 'A', label: "to put something in place or set up", correct: true },
          { id: 'B', label: "to remove something" },
          { id: 'C', label: "to repair something" }
        ]
      },
      {
        word: "device",
        definition: "an object or machine designed to do something",
        vietnamese: "thiết bị",
        exampleSentence: "An air conditioner is a device.",
        quizQuestion: "What is a device?",
        options: [
          { id: 'A', label: "an object or machine designed to do something", correct: true },
          { id: 'B', label: "a building" },
          { id: 'C', label: "a book" }
        ]
      },
      {
        word: "productivity",
        definition: "how efficiently something is done or produced",
        vietnamese: "tính năng suất",
        exampleSentence: "Air conditioning increases productivity in offices.",
        quizQuestion: "What is productivity?",
        options: [
          { id: 'A', label: "how efficiently something is done or produced", correct: true },
          { id: 'B', label: "how much money is earned" },
          { id: 'C', label: "how fast something goes" }
        ]
      },
      {
        word: "efficiency",
        definition: "the ability to use something in the best way possible",
        vietnamese: "hiệu quả",
        exampleSentence: "Efficient use of energy saves money.",
        quizQuestion: "What is efficiency?",
        options: [
          { id: 'A', label: "the ability to use something in the best way possible", correct: true },
          { id: 'B', label: "the ability to change something" },
          { id: 'C', label: "the ability to make something big" }
        ]
      },
      {
        word: "environmentalist",
        definition: "a person who works to protect the environment",
        vietnamese: "người bảo vệ môi trường",
        exampleSentence: "He is an environmentalist who campaigns against air pollution.",
        quizQuestion: "What is an environmentalist?",
        options: [
          { id: 'A', label: "a person who works to protect the environment", correct: true },
          { id: 'B', label: "a person who writes novels" },
          { id: 'C', label: "a person who cooks food" }
        ]
      },
    ];

    const grammarQuestions = [
      {
        question: "Carrier ___ the first air-conditioning unit in 1902.",
        type: 'Past Simple',
        options: ['design', 'designed', 'designs'],
        correctAnswer: 'B',
        explanation: {
          en: "This is past simple because it happened in 1902.",
          vn: "Đây là thì quá khứ đơn vì sự việc xảy ra trong quá khứ."
        }
      },
      {
        question: "The air conditioner ___ in the room.",
        type: 'Passive Voice',
        options: ['was installed', 'is installed', 'installs'],
        correctAnswer: 'A',
        explanation: {
          en: "This is passive voice because the focus is on the installation, not the person installing.",
          vn: "Đây là thì bị động vì trọng tâm ở việc lắp đặt, không phải người lắp đặt."
        }
      },
      {
        question: "The research ___ in the 1940s-50s.",
        type: 'Passive Voice',
        options: ['was carried out', 'carry out', 'carries out'],
        correctAnswer: 'A',
        explanation: {
          en: "This is passive voice because the focus is on the research, not who carried it out.",
          vn: "Đây là thì bị động vì trọng tâm ở việc nghiên cứu, không phải ai thực hiện."
        }
      },
      {
        question: "Because heat and moisture affected the paper, Carrier ___ the air conditioner.",
        type: 'Cause-effect',
        options: ['installed', 'was installed', 'install'],
        correctAnswer: 'A',
        explanation: {
          en: "This shows cause and effect using 'because'.",
          vn: "Đây thể hiện mối quan hệ nguyên nhân-kết quả sử dụng 'because'."
        }
      },
      {
        question: "Carrier designed the air conditioner ____. The workers were more productive.",
        type: 'Cause-effect',
        options: ['so', 'because', 'as a result'],
        correctAnswer: 'C',
        explanation: {
          en: "This shows cause and effect using 'as a result'.",
          vn: "Đây thể hiện mối quan hệ nguyên nhân-kết quả sử dụng 'as a result'."
        }
      },
      {
        question: "The air conditioner increased productivity. It was ____ than before.",
        type: 'Comparative',
        options: ['more efficient', 'most efficient', 'efficiency'],
        correctAnswer: 'A',
        explanation: {
          en: "This uses a comparative to show improvement.",
          vn: "Đây sử dụng từ so sánh để thể hiện cải thiện."
        }
      },
      {
        question: "The new air conditioner was ____ than the old one.",
        type: 'Comparative',
        options: ['better quality', 'best quality', 'quality'],
        correctAnswer: 'A',
        explanation: {
          en: "This uses a comparative to show improvement.",
          vn: "Đây sử dụng từ so sánh để thể hiện cải thiện."
        }
      },
      {
        question: "The office became more comfortable. The workers were ____.",
        type: 'Mixed',
        options: ['more productive', 'most productive', 'productive'],
        correctAnswer: 'A',
        explanation: {
          en: "This uses a comparative to show improvement.",
          vn: "Đây sử dụng từ so sánh để thể hiện cải thiện."
        }
      },
    ];

    const readingQuestions = [
      {
        question: "Why did Carrier invent air conditioning?",
        options: ['to make workers comfortable', 'to solve factory printing problems', 'to build homes', 'to sell machines'],
        correctAnswer: 'B',
        explanation: {
          en: "It was to fix problems in a printing factory caused by heat and humidity.",
          vn: "Ông tạo ra máy điều hòa để giải quyết vấn đề trong nhà máy in do nhiệt độ và độ ẩm gây ra."
        }
      },
      {
        question: "Why were home air conditioners not popular at first?",
        options: ['they were too expensive', 'people did not understand them', 'they broke easily', 'they looked ugly'],
        correctAnswer: 'A',
        explanation: {
          en: "Home air conditioners were too expensive at first.",
          vn: "Máy điều hòa gia đình quá đắt đỏ ban đầu."
        }
      },
      {
        question: "Why did employers initially refuse air conditioning?",
        options: ['it was too noisy', 'it used too much energy', 'it was not effective', 'it was too expensive'],
        correctAnswer: 'B',
        explanation: {
          en: "Employers initially refused air conditioning because it used too much energy.",
          vn: "Nhà tuyển dụng ban đầu từ chối điều hòa vì nó tiêu thụ quá nhiều điện."
        }
      },
      {
        question: "What was the purpose of research in the 1940s–50s?",
        options: ['to improve efficiency', 'to make it look better', 'to reduce costs', 'to increase sales'],
        correctAnswer: 'A',
        explanation: {
          en: "The purpose of research in the 1940s-50s was to improve efficiency.",
          vn: "Mục đích của nghiên cứu trong thập kỷ 1940-50 là cải thiện hiệu quả."
        }
      },
      {
        question: "What is Jed Brown’s opinion?",
        options: ['air conditioning is bad for the environment', 'air conditioning saves money', 'air conditioning makes people comfortable', 'air conditioning is unnecessary'],
        correctAnswer: 'A',
        explanation: {
          en: "Jed Brown thinks air conditioning is bad for the environment.",
          vn: "Jed Brown cho rằng điều hòa không tốt cho môi trường."
        }
      },
    ];

    const speakingData = [
      {
        question: "Can you summarize the passage about air conditioning in simple English?",
        sampleAnswer: "Air conditioning was invented by Willis Carrier in 1902. He made it to solve problems in a printing factory. Later, air conditioning became popular in offices, cinemas, and homes. It helps people work better, but it can also affect the environment."
      },
      {
        question: "Do you like air conditioning? Why or why not?",
        sampleAnswer: "Yes, I like air conditioning because it makes me feel comfortable in hot weather. However, I think it uses a lot of electricity."
      },
      {
        question: "How is air conditioning used in your country?",
        sampleAnswer: "In Vietnam, many houses, offices, and shops use air conditioning because it is very hot in summer."
      },
      {
        question: "Do you think air conditioning is good or bad for the environment?",
        sampleAnswer: "Air conditioning is good for people but it is bad for the environment because it can increase global warming."
      },
      {
        question: "Why do you think air conditioning increased productivity in offices?",
        sampleAnswer: "It increases productivity because people can work better when they feel comfortable and not too hot."
      },
    ];

    const VocabularySection = () => {
      const [currentWordIndex, setCurrentWordIndex] = React.useState(0);
      const currentWord = vocabularyData[currentWordIndex];

      const handleNext = () => {
        setCurrentWordIndex((prev) => (prev < vocabularyData.length - 1 ? prev + 1 : 0));
      };

      return (
        <div className="p-4">
          <h2>Vocabulary</h2>
          <div className="mb-4">
            <p><strong>Word:</strong> {currentWord.word}</p>
            <p><strong>Definition:</strong> {currentWord.definition} ({currentWord.vietnamese})</p>
            <p><strong>Example:</strong> {currentWord.exampleSentence}</p>
          </div>
          <h4>Quiz:</h4>
          {currentWord.quizQuestion}
          <div className="mb-4">
            {currentWord.options.map((option) => (
              <label key={option.id} className="block">
                <input
                  type="radio"
                  name="quizOption"
                  value={option.id}
                />
                {option.label} {option.correct ? '✔' : ''}
              </label>
            ))}
          </div>
          <button onClick={handleNext} className="bg-blue-500 text-white px-4 py-2 rounded">Next Word</button>
        </div>
      );
    };

    const GrammarSection = () => {
      const [currentQuestionIndex, setCurrentQuestionIndex] = React.useState(0);
      const currentQuestion = grammarQuestions[currentQuestionIndex];

      const handleNext = () => {
        setCurrentQuestionIndex((prev) => (prev < grammarQuestions.length - 1 ? prev + 1 : 0));
      };

      return (
        <div className="p-4">
          <h2>Grammar + Reading</h2>
          <div className="mb-4">
            {currentQuestion.question}
            <div className="mt-2">
              {currentQuestion.options.map((option, index) => (
                <label key={index} className="block">
                  <input
                    type="radio"
                    name="grammarOption"
                    value={option}
                  />
                  {option} {option === currentQuestion.correctAnswer ? '✔' : ''}
                </label>
              ))}
            </div>
          </div>
          <h4>Explanation:</h4>
          <p>{currentQuestion.explanation.en} ({currentQuestion.explanation.vn})</p>
          <button onClick={handleNext} className="bg-blue-500 text-white px-4 py-2 rounded">Next Question</button>
        </div>
      );
    };

    const ReadingSection = () => {
      const [currentQuestionIndex, setCurrentQuestionIndex] = React.useState(0);
      const currentQuestion = readingQuestions[currentQuestionIndex];

      const handleNext = () => {
        setCurrentQuestionIndex((prev) => (prev < readingQuestions.length - 1 ? prev + 1 : 0));
      };

      return (
        <div className="p-4">
          <h2>Reading Comprehension</h2>
          <div className="mb-4">
            {currentQuestion.question}
            <div className="mt-2">
              {currentQuestion.options.map((option, index) => (
                <label key={index} className="block">
                  <input
                    type="radio"
                    name="readingOption"
                    value={option}
                  />
                  {option} {option === currentQuestion.correctAnswer ? '✔' : ''}
                </label>
              ))}
            </div>
          </div>
          <h4>Explanation:</h4>
          <p>{currentQuestion.explanation.en} ({currentQuestion.explanation.vn})</p>
          <button onClick={handleNext} className="bg-blue-500 text-white px-4 py-2 rounded">Next Question</button>
        </div>
      );
    };

    const SpeakingSection = ({ feedback, setFeedback }) => {
      const [currentQuestionIndex, setCurrentQuestionIndex] = React.useState(0);
      const currentQuestion = speakingData[currentQuestionIndex];
      const [userAnswer, setUserAnswer] = React.useState('');

      const handleNext = () => {
        setCurrentQuestionIndex((prev) => (prev < speakingData.length - 1 ? prev + 1 : 0));
      };

      const handleFeedback = () => {
        // Simulate feedback
        setFeedback({
          fluency: "Good, but a bit short.",
          grammarMistakes: "You missed past tense in sentence 2.",
          vocabularySuggestions: "Try using 'comfortable' instead of 'good'.",
          improvedAnswer: "I like air conditioning because it makes me comfortable in hot weather.",
          explanationEn: "You need to use past tense or a full sentence.",
          explanationVn: "Bạn cần dùng thì quá khứ hoặc câu đầy đủ hơn."
        });
      };

      return (
        <div className="p-4">
          <h2>Speaking</h2>
          <div className="mb-4">
            {currentQuestion.question}
          </div>
          <div className="mb-4">
            <textarea
              value={userAnswer}
              onChange={(e) => setUserAnswer(e.target.value)}
              rows="5"
              cols="30"
              className="w-full p-2 border rounded"
            />
          </div>
          <button onClick={handleFeedback} className="bg-blue-500 text-white px-4 py-2 rounded">Submit and Get Feedback</button>
          <button onClick={handleNext} className="ml-2 bg-green-500 text-white px-4 py-2 rounded">Next Question</button>
          {feedback && <FeedbackComponent feedback={feedback} />}
        </div>
      );
    };

    const FeedbackComponent = ({ feedback }) => {
      return (
        <div className="p-4 border rounded mt-4 bg-yellow-100">
          <h3>Feedback:</h3>
          <p><strong>Fluency:</strong> {feedback.fluency}</p>
          <p><strong>Grammar Mistakes:</strong> {feedback.grammarMistakes}</p>
          <p><strong>Vocabulary Suggestions:</strong> {feedback.vocabularySuggestions}</p>
          <p><strong>Improved Answer:</strong> {feedback.improvedAnswer}</p>
          <p><strong>Explanation:</strong> {feedback.explanationEn} ({feedback.explanationVn})</p>
        </div>
      );
    };

    const App = () => {
      const [feedback, setFeedback] = React.useState(null);

      return (
        <div className="app">
          <header className="bg-blue-500 p-4 text-white text-center mb-4">
            <h1>Air Conditioning English Learning App</h1>
          </header>
          <Tabs className="mt-4">
            <TabList>
              <Tab>Vocabulary</Tab>
              <Tab>Grammar + Reading</Tab>
              <Tab>Speaking</Tab>
            </TabList>
            <TabPanels>
              <TabPanel>
                <VocabularySection />
              </TabPanel>
              <TabPanel>
                <GrammarSection />
              </TabPanel>
              <TabPanel>
                <SpeakingSection feedback={feedback} setFeedback={setFeedback} />
              </TabPanel>
            </TabPanels>
          </Tabs>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
